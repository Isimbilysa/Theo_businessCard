<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Digital business card - save contact, call, or email">
  <meta name="theme-color" content="#0b1220">
  <title>Digital Business Card</title>
  <link rel="stylesheet" href="styles.css">
  <!-- System font stack for fast load and native feel on mobile -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <main class="page">
    <!-- Centered profile card -->
    <article class="card">
      <!-- Circular profile photo -->
      <div class="card__photo-wrap">
        <img
          class="card__photo"
          src="Theo_im.jpeg"
          alt="Profile photo"
          width="120"
          height="120"
          onerror="this.style.display='none'; this.nextElementSibling?.classList.add('card__photo-placeholder--show');"
        >
        <!-- Fallback when profile.jpg is missing: replace with your photo -->
        <span class="card__photo-placeholder" aria-hidden="true">Photo</span>
      </div>

      <!-- Name and title -->
      <h1 class="card__name">Theo NTAKIRUTIMANA</h1>
      <p class="card__title">Project Manager</p>
      <p class="card__company">PROJEX</p>

      <hr class="card__divider" aria-hidden="true">

      <!-- Contact details -->
      <div class="card__contact" aria-label="Contact information">
        <a class="contact-row" href="tel:+224660712953" aria-label="Call +224660712953">
          <span class="contact-row__icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" width="20" height="20" focusable="false">
              <path fill="currentColor" d="M6.62 10.79a15.05 15.05 0 0 0 6.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1C10.07 21 3 13.93 3 5c0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.24.2 2.45.57 3.57.11.35.03.74-.25 1.02z"/>
            </svg>
          </span>
          <span class="contact-row__text">
            <span class="contact-row__label">Phone</span>
            <span class="contact-row__value">+224 660 712 953</span>
          </span>
        </a>

        <a class="contact-row" href="tel:+224624366121" aria-label="Call +224624366121">
          <span class="contact-row__icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" width="20" height="20" focusable="false">
              <path fill="currentColor" d="M6.62 10.79a15.05 15.05 0 0 0 6.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1C10.07 21 3 13.93 3 5c0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.24.2 2.45.57 3.57.11.35.03.74-.25 1.02z"/>
            </svg>
          </span>
          <span class="contact-row__text">
            <span class="contact-row__label">Phone</span>
            <span class="contact-row__value">+224 624 366 121</span>
          </span>
        </a>

        <a class="contact-row" href="mailto:theogene@projexciinc.com" aria-label="Send email">
          <span class="contact-row__icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" width="20" height="20" focusable="false">
              <path fill="currentColor" d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2m0 4-8 5-8-5V6l8 5 8-5z"/>
            </svg>
          </span>
          <span class="contact-row__text">
            <span class="contact-row__label">Email</span>
            <span class="contact-row__value">theogene@projexciinc.com</span>
          </span>
        </a>

        <a class="contact-row" href="https://www.projexci.com" target="_blank" rel="noopener" aria-label="Open website">
          <span class="contact-row__icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" width="20" height="20" focusable="false">
              <path fill="currentColor" d="M12 2a10 10 0 1 0 10 10A10 10 0 0 0 12 2m7.93 9h-3.18a15.6 15.6 0 0 0-1.38-5A8.03 8.03 0 0 1 19.93 11M12 4c.92 1.31 1.69 3.08 2.14 5H9.86C10.31 7.08 11.08 5.31 12 4M4.07 13h3.18a15.6 15.6 0 0 0 1.38 5A8.03 8.03 0 0 1 4.07 13m3.18-2H4.07A8.03 8.03 0 0 1 8.63 6a15.6 15.6 0 0 0-1.38 5M12 20c-.92-1.31-1.69-3.08-2.14-5h4.28c-.45 1.92-1.22 3.69-2.14 5m2.56-7H9.44c-.12-.64-.2-1.31-.2-2s.08-1.36.2-2h5.12c.12.64.2 1.31.2 2s-.08 1.36-.2 2m.81 5a15.6 15.6 0 0 0 1.38-5h3.18A8.03 8.03 0 0 1 15.37 18"/>
            </svg>
          </span>
          <span class="contact-row__text">
            <span class="contact-row__label">Website</span>
            <span class="contact-row__value">www.projexci.com</span>
          </span>
        </a>

        <div class="contact-row contact-row--static" aria-label="Address">
          <span class="contact-row__icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" width="20" height="20" focusable="false">
              <path fill="currentColor" d="M12 2a7 7 0 0 0-7 7c0 5.25 7 13 7 13s7-7.75 7-13a7 7 0 0 0-7-7m0 9.5A2.5 2.5 0 1 1 14.5 9 2.5 2.5 0 0 1 12 11.5"/>
            </svg>
          </span>
          <span class="contact-row__text">
            <span class="contact-row__label">Address</span>
            <span class="contact-row__value">Nongo, Commune de Ratoma, Conakry, Guinea</span>
          </span>
        </div>
      </div>

      <!-- Action buttons -->
      <div class="card__actions">
        <button type="button" class="btn btn--primary" id="btn-save-contact" aria-label="Save contact to phone">
          Save Contact
        </button>
        <a href="tel:+224660712953" class="btn btn--secondary" aria-label="Call">Call</a>
        <a href="mailto:theogene@projexciinc.com" class="btn btn--secondary" aria-label="Send email">Send Email</a>
      </div>
    </article>
  </main>

  <script src="script.js"></script>
</body>
</html>
